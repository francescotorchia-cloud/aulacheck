<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AulaCheck — Studente</title>
  <link rel="stylesheet" href="stile.css">
</head>
<body>

  <main id="schermata-codice" class="schermata">
    <h1 class="logo">AulaCheck</h1>
    <p class="sottotitolo">Inserisci il codice della sessione</p>
    <input type="text" id="input-codice" maxlength="6" placeholder="ES: X872X0" autocomplete="off">
    <button id="btn-entra">Entra</button>
    <p id="errore-codice" class="errore"></p>
  </main>

  <main id="schermata-attesa" class="schermata nascosta">
    <p class="sottotitolo">Sessione collegata</p>
    <h2 id="titolo-sessione"></h2>
    <p class="stato-attesa">In attesa che il docente avvii un round...</p>
  </main>

  <main id="schermata-voto" class="schermata nascosta">
    <div id="timer" class="timer">--</div>
    <p id="etichetta-round" class="etichetta-round"></p>
    <div id="opzioni-voto" class="opzioni-voto"></div>
    <p id="stato-voto" class="stato-voto"></p>
  </main>

  <script src="studente.js"></script>
</body>
</html>
