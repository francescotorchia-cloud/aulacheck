<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AulaCheck — Docente</title>
  <link rel="stylesheet" href="stile.css">
  <link rel="stylesheet" href="stile-docente.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
</head>
<body>

<main id="schermata-login" class="schermata">
  <h1 class="logo">AulaCheck</h1>
  <p class="sottotitolo">Accesso docente</p>

  <div class="card-form">
    <label for="input-email">Email</label>
    <input type="email" id="input-email" placeholder="email@esempio.com" autocomplete="username">

    <label for="input-password">Password</label>
    <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password">

    <button id="btn-login">Accedi</button>
    <p id="errore-login" class="errore"></p>
  </div>

  <button id="btn-vai-registrazione" class="btn-secondario" style="margin-top: 0.8rem;">Non hai un account? Registrati</button>
</main>

<main id="schermata-registrazione" class="schermata nascosta">
  <h1 class="logo">AulaCheck</h1>
  <p class="sottotitolo">Registrazione docente</p>

  <div class="card-form">
    <label for="input-email-reg">Email</label>
    <input type="email" id="input-email-reg" placeholder="email@esempio.com" autocomplete="username">

    <label for="input-password-reg">Password</label>
    <input type="password" id="input-password-reg" placeholder="••••••••" autocomplete="new-password">

    <button id="btn-registrati">Crea account</button>
    <p id="errore-registrazione" class="errore"></p>
  </div>

  <button id="btn-torna-login" class="btn-secondario" style="margin-top: 0.8rem;">← Torna al login</button>
</main>

<main id="schermata-lista" class="schermata schermata-larga nascosta">
  <h1 class="logo">AulaCheck</h1>
  <p class="sottotitolo">Le tue sessioni</p>

  <div id="elenco-sessioni" class="elenco-sessioni"></div>

  <button id="btn-nuova-sessione">Crea nuova sessione</button>
</main>
<main id="schermata-crea" class="schermata nascosta">
  <h1 class="logo">AulaCheck</h1>
  <p class="sottotitolo">Nuova sessione</p>

  <div class="card-form">
    <label for="input-titolo">Titolo della lezione</label>
    <input type="text" id="input-titolo" placeholder="es. Introduzione a REST">


    <button id="btn-crea">Crea sessione</button>
  </div>

  <button id="btn-annulla-crea" class="btn-secondario" style="margin-top: 0.8rem;">Annulla</button>
</main>
<main id="dashboard" class="dashboard nascosta">


<header class="intestazione">
  <div>
    <h2 id="dash-titolo"></h2>
    <p class="codice-grande">Codice: <span id="dash-codice"></span></p>
    <canvas id="qr-codice"></canvas>
    <div class="azioni-intestazione">
      <button id="btn-proietta" class="btn-secondario">Modalità proiezione</button>
      <button id="btn-torna-lista" class="btn-secondario">← Torna alle sessioni</button>
      <button id="btn-chiudi-sessione" class="btn-secondario btn-pericolo">Chiudi sessione</button>
    </div>
  </div>
</header>

 <div id="due-colonne" class="due-colonne">
<section id="pannello-pianificazione" class="pannello">
  <h3>Pianifica la lezione</h3>
  <input type="text" id="input-etichetta-pianifica" placeholder="Etichetta round">

  <select id="input-tipo-round-pianifica">
    <option value="comprehension">Comprensione (confuso / ok / perso)</option>
    <option value="debate">Dibattito (squadra A / squadra B / neutro)</option>
    <option value="truefalse">Vero o falso</option>
    <option value="custom">Personalizzato</option>
  </select>
  <input type="text" id="input-opzioni-custom-pianifica" placeholder="opzione1, opzione2, opzione3" class="nascosta">

  <input type="number" id="input-durata-pianifica" placeholder="Durata secondi" value="15" min="5">
  <button id="btn-pianifica" class="btn-secondario">Aggiungi alla lista</button>

  <div id="lista-pianificati" class="lista-pianificati"></div>

  <button id="btn-round-successivo">Round successivo</button>
</section>

  <div class="colonna-destra">
    <section id="pannello-avvio-rapido" class="pannello">
      <h3>Avvio rapido</h3>
      <p class="descrizione-pannello">Per un round improvvisato, senza pianificazione.</p>
      <input type="text" id="input-etichetta" placeholder="Etichetta round (facoltativa)">
       <select id="input-tipo-round-veloce">
    <option value="comprehension">Comprensione (confuso / ok / perso)</option>
    <option value="debate">Dibattito (squadra A / squadra B / neutro)</option>
    <option value="custom">Personalizzato</option>
  </select>
  <input type="text" id="input-opzioni-custom-veloce" placeholder="opzione1, opzione2, opzione3" class="nascosta">
      <input type="number" id="input-durata" placeholder="Durata secondi" value="15" min="5">
      <button id="btn-avvia-round" class="btn-secondario">Avvia subito</button>
    </section>

    <section class="pannello">
      <button id="btn-storico" class="btn-secondario">Mostra storico</button>
      <div id="lista-storico" class="lista-storico nascosta"></div>
    </section>
  </div>
</div>

    <section id="pannello-round" class="pannello nascosta">
      <div class="riga-round">
        <div id="dash-timer" class="dash-timer">--</div>
        <p id="dash-etichetta" class="dash-etichetta"></p>
        <button id="btn-chiudi-round" class="btn-secondario">Chiudi round</button>
      </div>
      <div id="risultati-live" class="risultati-live"></div>
    </section>

        <div id="overlay-proiezione" class="overlay-proiezione nascosta">
      <h1 class="logo-proiezione">AulaCheck</h1>
      <h2 id="proiezione-titolo" class="titolo-proiezione"></h2>
      <canvas id="qr-proiezione"></canvas>
      <p class="codice-proiezione">Codice: <span id="proiezione-codice"></span></p>
      <button id="btn-chiudi-proiezione" class="btn-secondario">Chiudi</button>
    </div>

  </main>

  <script src="docente.js"></script>
</body>
</html>
